repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
      - id: ty-check
        name: ty check
        entry: uv run ty check --respect-ignore-files app
        language: system
        pass_filenames: false
        types_or: [python, pyi]
